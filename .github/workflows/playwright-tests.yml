name: Playwright Tests

on:
  pull_request:
    branches: [master]
  push:
    branches: [master]

permissions:
  contents: read

concurrency:
  group: playwright-tests-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  playwright-tests:
    name: playwright-tests
    runs-on: ubuntu-latest
    timeout-minutes: 30
    permissions:
      contents: read
    defaults:
      run:
        working-directory: ai.test.maintenance+ci
    env:
      CI: "true"

    steps:
      # Check out the pull request contents.
      - name: Checkout
        uses: actions/checkout@v4

      # Set up the latest LTS Node.js runtime with npm dependency caching.
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: lts/*
          cache: npm
          cache-dependency-path: ai.test.maintenance+ci/package-lock.json

      # Install project dependencies from the committed lockfile.
      - name: Install dependencies
        run: npm ci

      # Install Playwright browsers and required system dependencies.
      - name: Install Playwright browsers
        run: npx playwright install --with-deps

      # Run the Playwright suite in CI.
      - name: Run Playwright tests
        run: npx playwright test

      # Always upload the HTML report for debugging and review.
      - name: Upload Playwright HTML report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-html-report
          path: ai.test.maintenance+ci/playwright-report
          if-no-files-found: warn

      # Always upload Playwright traces from failed or retained runs.
      - name: Upload Playwright traces
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-traces
          path: |
            ai.test.maintenance+ci/test-results/**/trace*.zip
            ai.test.maintenance+ci/test-results/**/trace.zip
          if-no-files-found: warn

  security-scan:
    name: security-scan
    runs-on: ubuntu-latest
    timeout-minutes: 30
    continue-on-error: false
    defaults:
      run:
        working-directory: ai.test.maintenance+ci

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: lts/*
          cache: npm
          cache-dependency-path: ai.test.maintenance+ci/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Run dependency audit
        shell: bash
        run: |
          npm audit --audit-level=high --json > audit.json || audit_exit=$?
          node <<'EOF'
          const fs = require('fs');
          const report = JSON.parse(fs.readFileSync('audit.json', 'utf8'));
          const metadata = report.metadata?.vulnerabilities ?? {};
          const high = metadata.high ?? 0;
          const critical = metadata.critical ?? 0;

          fs.appendFileSync(process.env.GITHUB_STEP_SUMMARY, `## Dependency Security Scan\n`);
          fs.appendFileSync(process.env.GITHUB_STEP_SUMMARY, `- High: ${high}\n`);
          fs.appendFileSync(process.env.GITHUB_STEP_SUMMARY, `- Critical: ${critical}\n`);

          if (high > 0 || critical > 0) {
            process.exit(1);
          }
          EOF

  deploy-pages:
    name: deploy-pages
    runs-on: ubuntu-latest
    needs: playwright-tests
    if: always() && github.ref == 'refs/heads/master'
    permissions:
      contents: read
      pages: write
      id-token: write
    environment: github-pages

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Download Playwright HTML report
        uses: actions/download-artifact@v4
        with:
          name: playwright-html-report
          path: playwright-report

      - name: Prepare Pages history
        env:
          RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
          JOB_CONCLUSION: ${{ needs.playwright-tests.result }}
        run: |
          rm -rf gh-pages-history
          mkdir -p gh-pages-history

          if git ls-remote --exit-code origin gh-pages >/dev/null 2>&1; then
            git fetch origin gh-pages --depth=1
            git worktree add gh-pages-history origin/gh-pages
          fi

          node <<'EOF'
          const fs = require('fs');
          const path = require('path');

          const reportDir = path.join(process.cwd(), 'playwright-report');
          const oldHistoryPath = path.join(process.cwd(), 'gh-pages-history', 'history.json');
          const newHistoryPath = path.join(reportDir, 'history.json');
          const summaryPath = path.join(reportDir, 'data', 'test-results.json');

          let history = [];
          if (fs.existsSync(oldHistoryPath)) {
            try {
              history = JSON.parse(fs.readFileSync(oldHistoryPath, 'utf8'));
            } catch {
              history = [];
            }
          }

          let counts = null;
          if (fs.existsSync(summaryPath)) {
            try {
              const summary = JSON.parse(fs.readFileSync(summaryPath, 'utf8'));
              counts = Array.isArray(summary?.suites)
                ? { suites: summary.suites.length }
                : null;
            } catch {
              counts = null;
            }
          }

          history.push({
            timestamp: new Date().toISOString(),
            runUrl: process.env.RUN_URL,
            commitSha: process.env.GITHUB_SHA,
            ref: process.env.GITHUB_REF,
            branch: process.env.GITHUB_REF_NAME,
            conclusion: process.env.JOB_CONCLUSION,
            counts,
          });

          fs.writeFileSync(newHistoryPath, JSON.stringify(history.slice(-50), null, 2));
          EOF

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: playwright-report

      - name: Deploy Playwright report to GitHub Pages
        uses: actions/deploy-pages@v4
