name: Playwright Tests

on:
  pull_request:
    branches: [master]
  push:
    branches: [master]

permissions:
  contents: read

concurrency:
  group: playwright-tests-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  playwright-tests:
    name: playwright-tests
    runs-on: ubuntu-latest
    timeout-minutes: 30
    env:
      CI: "true"
    defaults:
      run:
        working-directory: ai.test.maintenance+ci

    steps:
      # Check out repository contents.
      - name: Checkout
        uses: actions/checkout@v4

      # Set up the latest LTS Node.js runtime with Yarn caching.
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: lts/*
          cache: npm
          cache-dependency-path: ai.test.maintenance+ci/package-lock.json

      # Install project dependencies from the committed lockfile.
      - name: Install dependencies
        run: npm ci

      # Install Playwright browsers and required system dependencies.
      - name: Install Playwright browsers
        run: npx playwright install --with-deps

      # Run the Playwright suite in CI.
      - name: Run Playwright tests
        run: npx playwright test

      # Always upload the HTML report for debugging and review.
      - name: Upload Playwright HTML report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-html-report
          path: ai.test.maintenance+ci/playwright-report
          if-no-files-found: warn

      # Always upload Playwright traces from failed or retained runs.
      - name: Upload Playwright traces
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-traces
          path: |
            ai.test.maintenance+ci/test-results/**/trace*.zip
            ai.test.maintenance+ci/test-results/**/trace.zip
          if-no-files-found: warn
