name: Playwright Tests

on:
  pull_request:
    branches: [main, master]

permissions:
  contents: read

concurrency:
  group: playwright-tests-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  playwright-tests:
    name: playwright-tests
    runs-on: ubuntu-latest
    timeout-minutes: 30
    env:
      CI: "true"

    steps:
      # Check out the pull request contents.
      - name: Checkout
        uses: actions/checkout@v4

      # Set up the latest LTS Node.js runtime with Yarn dependency caching.
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: lts/*
          cache: yarn
          cache-dependency-path: yarn.lock

      # Install project dependencies with Yarn in immutable CI mode.
      - name: Yarn install
        run: |
          corepack enable
          yarn install --immutable --immutable-cache --check-cache

      # Install Playwright browsers and required system dependencies.
      - name: Install Playwright browsers
        run: yarn playwright install --with-deps

      # Run the Playwright suite in CI.
      - name: Run Playwright tests
        run: yarn playwright test

      # Always upload the HTML report for debugging and review.
      - name: Upload Playwright HTML report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-html-report
          path: playwright-report
          if-no-files-found: warn

      # Always upload Playwright traces from failed or retained runs.
      - name: Upload Playwright traces
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-traces
          path: |
            test-results/**/trace*.zip
            test-results/**/trace.zip
          if-no-files-found: warn
